{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/ai.css' %}">
{% endblock %}

{% block content %}

<div class="ai-wrapper">

    <div class="ai-header">
        Learning AI Assistant
    </div>

    <div class="quick-questions">
        <button onclick="quickAsk('Create a math test')">📊 Math Test</button>
        <button onclick="quickAsk('Explain fractions')">➗ Fractions</button>
        <button onclick="quickAsk('Create an English test')">📘 English Test</button>
        <button onclick="quickAsk('Explain geometry')">📐 Geometry</button>
        <button onclick="quickAsk('Give me a science quiz')">🔬 Science Quiz</button>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input id="messageInput" type="text" placeholder="Write a lesson topic..." />
        <button id="sendBtn">Send</button>
    </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

let typingDiv = null;

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("message", type);

    let content = String(text);

    if (window.marked) {
        content = marked.parse(content);
        div.innerHTML = content;
    } else {
        div.textContent = content;
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
    typingDiv = document.createElement("div");
    typingDiv.classList.add("message", "bot", "typing");
    typingDiv.innerHTML = `
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
    `;
    chatBox.appendChild(typingDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    if (typingDiv) {
        typingDiv.remove();
        typingDiv = null;
    }
}

async function sendMessage(textFromButton = null) {
    const message = textFromButton || input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    showTyping();

    try {
        const res = await fetch("/ai/chat/", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        removeTyping();
        addMessage(data.response || "Error ❌", "bot");

    } catch (err) {
        removeTyping();
        addMessage("Network error ❌", "bot");
    }
}

function quickAsk(text) {
    sendMessage(text);
}

sendBtn.addEventListener("click", () => sendMessage());

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
});

addMessage(
    "Hello! I am your learning assistant. I can help you with lessons and quizzes.",
    "bot"
);
</script>

{% endblock %}
