{% extends 'base.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/ai.css' %}">
{% endblock %}

{% block content %}

<div class="ai-wrapper">

    <div class="ai-header">
        Learning AI Assistant
    </div>

    <!-- quick buttons -->
    <div class="quick-questions">
        <button onclick="quickAsk('Create a math test')">📊 Math Test</button>
        <button onclick="quickAsk('Explain fractions')">➗ Fractions</button>
        <button onclick="quickAsk('Create an English test')">📘 English Test</button>
        <button onclick="quickAsk('Explain geometry')">📐 Geometry</button>
        <button onclick="quickAsk('Give me a science quiz')">🔬 Science Quiz</button>
    </div>

    <!-- chat -->
    <div id="chatBox" class="chat-box"></div>

    <!-- input -->
    <div class="input-area">
        <input id="messageInput" type="text" placeholder="Write a lesson topic..." />
        <button id="sendBtn">Send</button>
    </div>

</div>

<script>
const chatBox = document.getElementById("chatBox");
const input = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");

/* =========================
   ADD MESSAGE (MARKDOWN + MATH FIX)
========================= */
function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("message", type);

    let content = String(text);

    // Markdown (если подключен marked)
    if (window.marked) {
        content = marked.parse(content);
        div.innerHTML = content;
    } else {
        div.textContent = content;
    }

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    // MathJax render (формулы)
    if (window.MathJax) {
        MathJax.typesetPromise([div]);
    }
}

/* =========================
   SEND MESSAGE
========================= */
async function sendMessage(textFromButton = null) {
    const message = textFromButton || input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
        const res = await fetch("/ai/chat/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
        });

        const data = await res.json();

        addMessage(data.response || "Error from AI ❌", "bot");

    } catch (err) {
        addMessage("Network error ❌", "bot");
    }
}

/* =========================
   QUICK BUTTONS
========================= */
function quickAsk(text) {
    sendMessage(text);
}

/* =========================
   EVENTS
========================= */
sendBtn.addEventListener("click", () => sendMessage());

input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
});

/* =========================
   WELCOME MESSAGE
========================= */
addMessage(
    "Hello! I am your learning assistant. I can help you with lessons and quizzes.",
    "bot"
);
</script>

{% endblock %}
