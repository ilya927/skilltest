{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/welcome.css' %}">
</head>

<body>

<div id="particles"></div>

<div class="container text-center">
    <div class="glass">

        <h1>Welcome to SkillTest</h1>

        <p>Choose how you want to continue</p>

        <div class="d-flex justify-content-center gap-3 mt-4">

            <a href="{% url 'guest_login' %}" class="btn btn-outline-light btn-lg">Enter</a>

            <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Login</a>

            <a href="{% url 'register' %}" class="btn btn-success btn-lg">Register</a>

        </div>

    </div>
</div>

<script>
    const particles = document.getElementById("particles");

    function createParticle() {
        const dot = document.createElement("div");
        dot.classList.add("dot");

        dot.style.left = Math.random() * window.innerWidth + "px";
        dot.style.animationDuration = (4 + Math.random() * 4) + "s";

        particles.appendChild(dot);

        setTimeout(() => dot.remove(), 8000);
    }

    setInterval(createParticle, 200);
</script>

</body>
</html>
