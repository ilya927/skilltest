{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/logreg.css' %}">
</head>

<body>

<a href="{% url 'welcome' %}" class="back-btn">
    ← Back
</a>

<div class="page">

    <div class="glass">

        <h2>Login</h2>

        <p class="subtitle">
            Welcome back
        </p>

        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                class="form-control mb-3"
                placeholder="Username">

            <input
                type="password"
                name="password"
                class="form-control mb-4"
                placeholder="Password">

            <button class="btn-main">
                Login
            </button>

        </form>

        <div class="bottom-link">
            Don't have an account?
            <a href="{% url 'register' %}">
                Register
            </a>
        </div>

    </div>

</div>

</body>
</html>
